<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Monte Carlo Risk Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #000000;
        --card: #111111;
        --gold: #d4af37;
        --gold-light: #fad9a1;
        --text: #f8faff;
        --text-muted: #9ca3af;
        --green: #047857;
        --red: #991b1b;
        --border: rgba(255, 255, 255, 0.06);
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Vazirmatn", sans-serif;
        padding: 20px;
      }
      .container {
        max-width: 1100px;
        margin: auto;
      }
      h1 {
        text-align: center;
        color: var(--gold);
        font-size: 2rem;
        margin-bottom: 10px;
      }
      .subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 40px;
      }

      .inputs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        background: var(--card);
        padding: 25px;
        border-radius: 16px;
        border: 1px solid var(--border);
        margin-bottom: 30px;
      }
      .input-group {
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        padding: 14px;
        background: #0d0d0d;
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 1rem;
      }
      button {
        background: linear-gradient(135deg, var(--gold), #b89778);
        color: #000;
        padding: 16px 32px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        margin: 30px auto;
        display: block;
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        transition: 0.3s;
      }
      button:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin: 40px 0;
      }
      .stat-card {
        background: var(--card);
        padding: 25px;
        border-radius: 16px;
        text-align: center;
        border: 1px solid var(--border);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      }
      .stat-value {
        font-size: 2.2rem;
        font-weight: 800;
        margin: 15px 0;
      }
      .positive {
        color: var(--green);
      }
      .warning {
        color: #f59e0b;
      }
      .danger {
        color: var(--red);
      }
      .gold {
        color: var(--gold);
      }

      canvas {
        background: #111;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Monte Carlo Risk Simulator</h1>
      <p class="subtitle">
        شبیه‌سازی ۱۰,۰۰۰ سناریوی ممکن آینده حساب معاملاتی شما
      </p>

      <div class="inputs">
        <div class="input-group">
          <label>سرمایه اولیه ($)</label>
          <input type="number" id="capital" value="10000" />
        </div>
        <div class="input-group">
          <label>وین‌ریت (%)</label>
          <input type="number" id="winrate" value="55" />
        </div>
        <div class="input-group">
          <label>ریسک به ریوارد (R:R)</label>
          <input type="number" step="0.1" id="rr" value="2.0" />
        </div>
        <div class="input-group">
          <label>ریسک هر معامله (% از حساب)</label>
          <input type="number" step="0.1" id="risk" value="1" />
        </div>
        <div class="input-group">
          <label>تعداد معاملات پیش‌بینی‌شده</label>
          <input type="number" id="trades" value="300" />
        </div>
        <div class="input-group">
          <label>تعداد شبیه‌سازی‌ها</label>
          <input type="number" id="simulations" value="10000" />
        </div>
      </div>

      <button onclick="runSimulation()">اجرای شبیه‌سازی Monte Carlo</button>

      <div class="results-grid">
        <div class="stat-card">
          <div>سرمایه میانگین نهایی</div>
          <div class="stat-value gold" id="avgFinal">—</div>
        </div>
        <div class="stat-card">
          <div>احتمال سوددهی (>0%)</div>
          <div class="stat-value positive" id="probProfit">—</div>
        </div>
        <div class="stat-card">
          <div>احتمال از بین رفتن حساب (<10% اولیه)</div>
          <div class="stat-value danger" id="probRuin">—</div>
        </div>
        <div class="stat-card">
          <div>حداکثر دراوداون میانگین</div>
          <div class="stat-value warning" id="avgDD">—</div>
        </div>
      </div>

      <canvas id="monteChart" height="400"></canvas>
    </div>

    <script>
      let chart;

      function runSimulation() {
        const capital = +document.getElementById("capital").value;
        const winrate = +document.getElementById("winrate").value / 100;
        const rr = +document.getElementById("rr").value;
        const risk = +document.getElementById("risk").value / 100;
        const trades = +document.getElementById("trades").value;
        const simulations = +document.getElementById("simulations").value;

        let finalEquities = [];
        let allPaths = []; // برای بهترین/بدترین/میانگین
        let best = Array(trades + 1).fill(0);
        let worst = Array(trades + 1).fill(Infinity);
        let sum = Array(trades + 1).fill(0);

        for (let sim = 0; sim < simulations; sim++) {
          let equity = capital;
          let path = [capital];
          let peak = capital;
          let maxDD = 0;

          for (let t = 0; t < trades; t++) {
            if (Math.random() < winrate) {
              equity += equity * risk * rr;
            } else {
              equity -= equity * risk;
            }
            peak = Math.max(peak, equity);
            maxDD = Math.max(maxDD, (peak - equity) / peak);
            path.push(equity);
          }

          finalEquities.push(equity);
          // به‌روزرسانی بهترین/بدترین/میانگین مسیر
          for (let i = 0; i <= trades; i++) {
            best[i] = Math.max(best[i], path[i]);
            worst[i] = Math.min(worst[i], path[i]);
            sum[i] += path[i];
          }
        }

        // میانگین مسیر
        let avgPath = sum.map((s) => s / simulations);

        // آمار
        const avgFinal = finalEquities.reduce((a, b) => a + b, 0) / simulations;
        const probProfit =
          (finalEquities.filter((e) => e > capital).length / simulations) * 100;
        const probRuin =
          (finalEquities.filter((e) => e < capital * 0.1).length /
            simulations) *
          100;
        const avgMaxDD =
          finalEquities
            .map((e) => {
              // تقریبی دراوداون میانگین
              return (
                ((Math.max(...finalEquities) - e) /
                  Math.max(...finalEquities)) *
                100
              );
            })
            .reduce((a, b) => a + b, 0) / simulations;

        document.getElementById("avgFinal").textContent =
          "$" + avgFinal.toFixed(0);
        document.getElementById("probProfit").textContent =
          probProfit.toFixed(1) + "%";
        document.getElementById("probRuin").textContent =
          probRuin.toFixed(1) + "%";
        document.getElementById("avgDD").textContent =
          avgMaxDD.toFixed(1) + "%";

        // رسم چارت
        const labels = Array.from({ length: trades + 1 }, (_, i) => i);

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById("monteChart"), {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "بهترین سناریو",
                data: best,
                borderColor: "#34d399",
                backgroundColor: "rgba(52,211,153,0.1)",
                fill: false,
                tension: 0.3,
              },
              {
                label: "میانگین",
                data: avgPath,
                borderColor: "#d4af37",
                borderWidth: 4,
                fill: false,
                tension: 0.3,
              },
              {
                label: "بدترین سناریو",
                data: worst,
                borderColor: "#ef4444",
                backgroundColor: "rgba(239,68,68,0.1)",
                fill: false,
                tension: 0.3,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: "#f8faff" } } },
            scales: {
              x: {
                title: {
                  display: true,
                  text: "تعداد معاملات",
                  color: "#9ca3af",
                },
                grid: { color: "rgba(255,255,255,0.05)" },
                ticks: { color: "#9ca3af" },
              },
              y: {
                title: { display: true, text: "سرمایه ($)", color: "#9ca3af" },
                grid: { color: "rgba(255,255,255,0.05)" },
                ticks: { color: "#9ca3af" },
              },
            },
          },
        });
      }

      // اجرای اولیه
      runSimulation();
    </script>
  </body>
</html>
