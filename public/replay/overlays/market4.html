<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Equity Curve Simulator</title>
    <style>
      :root {
        --bg: #000;
        --card: #111;
        --gold: #d4af37;
        --text: #f8faff;
        --green: #047857;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Vazirmatn, sans-serif;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
      }
      h1 {
        text-align: center;
        color: var(--gold);
      }
      .inputs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin: 30px 0;
      }
      input {
        padding: 12px;
        background: #0d0d0d;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        color: var(--text);
      }
      canvas {
        background: #111;
        border-radius: 12px;
        margin-top: 30px;
      }
      .results {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 20px;
        text-align: center;
      }
      .result {
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>شبیه‌ساز رشد سرمایه</h1>

      <div class="inputs">
        <div>
          <label>سرمایه اولیه ($)</label
          ><input
            type="number"
            id="capital"
            value="10000"
            onchange="simulate()"
          />
        </div>
        <div>
          <label>وین‌ریت (%)</label
          ><input type="number" id="winrate" value="60" onchange="simulate()" />
        </div>
        <div>
          <label>ریسک به ریوارد</label
          ><input
            type="number"
            step="0.1"
            id="rr"
            value="2"
            onchange="simulate()"
          />
        </div>
        <div>
          <label>تعداد معامله</label
          ><input type="number" id="trades" value="100" onchange="simulate()" />
        </div>
        <div>
          <label>ریسک هر معامله (%)</label
          ><input
            type="number"
            step="0.1"
            id="risk"
            value="1"
            onchange="simulate()"
          />
        </div>
      </div>

      <canvas id="chart" width="800" height="400"></canvas>

      <div class="results">
        <div class="result">
          <div style="font-size: 1.8rem; color: var(--green)" id="final">0</div>
          <div>سرمایه نهایی</div>
        </div>
        <div class="result">
          <div style="font-size: 1.8rem; color: var(--gold)" id="profit">
            0%
          </div>
          <div>سود کل</div>
        </div>
        <div class="result">
          <div style="font-size: 1.8rem" id="drawdown">0%</div>
          <div>حداکثر دراوداون</div>
        </div>
      </div>
    </div>

    <script>
      const ctx = document.getElementById("chart").getContext("2d");
      let chart;

      function simulate() {
        const capital = +document.getElementById("capital").value;
        const winrate = +document.getElementById("winrate").value / 100;
        const rr = +document.getElementById("rr").value;
        const trades = +document.getElementById("trades").value;
        const risk = +document.getElementById("risk").value / 100;

        let equity = [capital];
        let current = capital;
        let maxDD = 0;
        let peak = capital;

        for (let i = 0; i < trades; i++) {
          if (Math.random() < winrate) {
            current += current * risk * rr;
          } else {
            current -= current * risk;
          }
          peak = Math.max(peak, current);
          maxDD = Math.max(maxDD, ((peak - current) / peak) * 100);
          equity.push(current);
        }

        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: equity.map((_, i) => i),
            datasets: [
              {
                data: equity,
                borderColor: "#d4af37",
                tension: 0.3,
                fill: false,
              },
            ],
          },
          options: {
            scales: { y: { beginAtZero: false } },
            plugins: { legend: { display: false } },
          },
        });

        document.getElementById("final").textContent = current.toFixed(0) + "$";
        document.getElementById("profit").textContent =
          (((current - capital) / capital) * 100).toFixed(1) + "%";
        document.getElementById("drawdown").textContent =
          maxDD.toFixed(1) + "%";
      }
      simulate();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
