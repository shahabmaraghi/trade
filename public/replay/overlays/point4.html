<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Psychology Tracker</title>
    <style>
      :root {
        --bg: #000;
        --card: #111;
        --gold: #d4af37;
        --text: #f8faff;
        --border: rgba(255, 255, 255, 0.06);
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Vazirmatn, sans-serif;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
      }
      h1 {
        text-align: center;
        color: var(--gold);
      }
      .mood-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        margin: 30px 0;
      }
      .mood {
        text-align: center;
        padding: 20px;
        background: var(--card);
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }
      .mood:hover {
        background: #1a1a1a;
        transform: scale(1.05);
      }
      .mood.selected {
        border: 2px solid var(--gold);
      }
      textarea {
        width: 100%;
        height: 120px;
        padding: 15px;
        background: #0d0d0d;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        margin: 20px 0;
      }
      button {
        background: var(--gold);
        color: #000;
        padding: 12px;
        border: none;
        border-radius: 8px;
        width: 100%;
        font-weight: bold;
      }
      .patterns {
        margin-top: 30px;
        background: var(--card);
        padding: 20px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Psychology Tracker</h1>
      <p style="text-align: center">احساس فعلی خود را انتخاب کنید</p>

      <div class="mood-grid">
        <div class="mood" onclick="selectMood(this,'greed')">طمع</div>
        <div class="mood" onclick="selectMood(this,'fear')">ترس</div>
        <div class="mood" onclick="selectMood(this,'fomo')">FOMO</div>
        <div class="mood" onclick="selectMood(this,'confident')">
          اعتماد به نفس
        </div>
        <div class="mood" onclick="selectMood(this,'calm')">آرامش</div>
      </div>

      <textarea id="notes" placeholder="توضیح احساس و دلیل..."></textarea>
      <button onclick="savePsych()">ثبت احساس</button>

      <div class="patterns">
        <h3>الگوهای تکراری</h3>
        <div id="patterns-list">هنوز داده‌ای ثبت نشده</div>
      </div>
    </div>

    <script>
      let psych = JSON.parse(localStorage.getItem("psych") || "[]");
      function selectMood(el, mood) {
        document
          .querySelectorAll(".mood")
          .forEach((m) => m.classList.remove("selected"));
        el.classList.add("selected");
        window.currentMood = mood;
      }
      function savePsych() {
        if (!window.currentMood) return alert("احساس را انتخاب کنید");
        psych.push({
          date: new Date().toLocaleDateString("fa-IR"),
          mood: window.currentMood,
          notes: document.getElementById("notes").value,
        });
        localStorage.setItem("psych", JSON.stringify(psych));
        updatePatterns();
      }
      function updatePatterns() {
        let counts = psych.reduce((a, c) => {
          a[c.mood] = (a[c.mood] || 0) + 1;
          return a;
        }, {});
        document.getElementById("patterns-list").innerHTML = Object.entries(
          counts
        )
          .map(([k, v]) => `<div>${k}: ${v} بار</div>`)
          .join("");
      }
      updatePatterns();
    </script>
  </body>
</html>
